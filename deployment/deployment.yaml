apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee
spec:
  replicas: 2
  selector:
    matchLabels:
      app: employee
  template:
    metadata:
      labels:
        app: employee
    spec:
      containers:
        - name: employee
          image: javad86/employee:20
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://192.168.1.153:5432/employeedb
            - name: SPRING_DATASOURCE_USERNAME
              value: javad
            - name: SPRING_DATASOURCE_PASSWORD
              value: password